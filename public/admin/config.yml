backend:
  name: github
  repo: ristotoldsep/astro-project
  branch: main
  base_url: https://qinutritionist-cms-auth.r-toldsep.workers.dev

media_folder: src/assets/images
public_folder: /src/assets/images

collections:

  # ── HOME PAGE ─────────────────────────────────────────────────────────────
  - name: home
    label: "Home Page"
    files:

      - name: home_en
        label: "Home – English"
        file: src/i18n/en.json
        fields:
          - name: home
            label: Home
            widget: object
            fields:
              - { name: heroEyebrow,   label: "Hero Eyebrow",    widget: string }
              - { name: heroSubtitle,  label: "Hero Subtitle",   widget: string }
              - { name: heroCta1,      label: "Hero Button 1",   widget: string }
              - { name: heroCta2,      label: "Hero Button 2",   widget: string }
              - { name: welcomeP1,     label: "Welcome Paragraph 1", widget: text }
              - { name: welcomeP2,     label: "Welcome Paragraph 2", widget: text }
              - { name: welcomeP3,     label: "Welcome Paragraph 3", widget: text }
              - { name: welcomeP4,     label: "Welcome Paragraph 4", widget: text }
              - { name: quoteText,     label: "Quote Text",      widget: text }
              - { name: quoteAttr,     label: "Quote Attribution", widget: string }
              - { name: parallaxText,  label: "Events Banner Text", widget: string }
              - { name: guideH2,       label: "Free Guide Heading", widget: string }
              - { name: guideText,     label: "Free Guide Text", widget: text }
              - name: servicesPreview
                label: "Services Preview (3 cards)"
                widget: list
                fields:
                  - { name: tag,   label: "Tag / Duration & Price", widget: string }
                  - { name: title, label: Title, widget: string }
                  - { name: text,  label: Description, widget: text }
              - name: pillars
                label: "Three Pillars"
                widget: list
                fields:
                  - { name: icon,  label: Icon (emoji), widget: string }
                  - { name: label, label: Label,  widget: string }
                  - { name: title, label: Title,  widget: string }
                  - { name: text,  label: Description, widget: text }

      - name: home_et
        label: "Home – Estonian"
        file: src/i18n/et.json
        fields:
          - name: home
            label: Avaleht
            widget: object
            fields:
              - { name: heroEyebrow,   label: "Hero Eyebrow",    widget: string }
              - { name: heroSubtitle,  label: "Hero Subtitle",   widget: string }
              - { name: heroCta1,      label: "Hero Nupp 1",     widget: string }
              - { name: heroCta2,      label: "Hero Nupp 2",     widget: string }
              - { name: welcomeP1,     label: "Tervituse lõik 1", widget: text }
              - { name: welcomeP2,     label: "Tervituse lõik 2", widget: text }
              - { name: welcomeP3,     label: "Tervituse lõik 3", widget: text }
              - { name: welcomeP4,     label: "Tervituse lõik 4", widget: text }
              - { name: quoteText,     label: "Tsitaat",          widget: text }
              - { name: quoteAttr,     label: "Tsitaadi autor",   widget: string }
              - { name: parallaxText,  label: "Ürituste bänner",  widget: string }
              - { name: guideH2,       label: "Tasuta juhendi pealkiri", widget: string }
              - { name: guideText,     label: "Tasuta juhendi tekst", widget: text }
              - name: servicesPreview
                label: "Teenuste eelvaade (3 kaarti)"
                widget: list
                fields:
                  - { name: tag,   label: "Silt / Kestus & Hind", widget: string }
                  - { name: title, label: Pealkiri, widget: string }
                  - { name: text,  label: Kirjeldus, widget: text }
              - name: pillars
                label: "Kolm sammast"
                widget: list
                fields:
                  - { name: icon,  label: Ikoon,     widget: string }
                  - { name: label, label: Silt,      widget: string }
                  - { name: title, label: Pealkiri,  widget: string }
                  - { name: text,  label: Kirjeldus, widget: text }

      - name: home_es
        label: "Home – Spanish"
        file: src/i18n/es.json
        fields:
          - name: home
            label: Inicio
            widget: object
            fields:
              - { name: heroEyebrow,   label: "Hero Eyebrow",    widget: string }
              - { name: heroSubtitle,  label: "Hero Subtítulo",  widget: string }
              - { name: heroCta1,      label: "Hero Botón 1",    widget: string }
              - { name: heroCta2,      label: "Hero Botón 2",    widget: string }
              - { name: welcomeP1,     label: "Párrafo bienvenida 1", widget: text }
              - { name: welcomeP2,     label: "Párrafo bienvenida 2", widget: text }
              - { name: welcomeP3,     label: "Párrafo bienvenida 3", widget: text }
              - { name: welcomeP4,     label: "Párrafo bienvenida 4", widget: text }
              - { name: quoteText,     label: "Cita",            widget: text }
              - { name: quoteAttr,     label: "Autor de la cita", widget: string }
              - { name: parallaxText,  label: "Banner Eventos",  widget: string }
              - { name: guideH2,       label: "Título guía gratuita", widget: string }
              - { name: guideText,     label: "Texto guía gratuita", widget: text }
              - name: servicesPreview
                label: "Servicios (3 tarjetas)"
                widget: list
                fields:
                  - { name: tag,   label: "Etiqueta / Duración & Precio", widget: string }
                  - { name: title, label: Título, widget: string }
                  - { name: text,  label: Descripción, widget: text }
              - name: pillars
                label: "Tres pilares"
                widget: list
                fields:
                  - { name: icon,  label: Icono,       widget: string }
                  - { name: label, label: Etiqueta,    widget: string }
                  - { name: title, label: Título,      widget: string }
                  - { name: text,  label: Descripción, widget: text }

  # ── SERVICES PAGE ─────────────────────────────────────────────────────────
  - name: services
    label: "Services Page"
    files:

      - name: services_en
        label: "Services – English"
        file: src/i18n/en.json
        fields:
          - name: services
            label: Services
            widget: object
            fields:
              - { name: introText, label: "Intro Text", widget: text }
              - name: services
                label: "Individual Sessions"
                widget: list
