                    widget: list
                    field: { name: feature, label: Feature, widget: string }
              - name: programs
                label: "3-Month Programs"
                widget: list
                fields:
                  - { name: tag,         label: Tag,         widget: string }
                  - { name: title,       label: Title,       widget: string }
                  - { name: titleItalic, label: "Title (italic)", widget: string }
                  - { name: description, label: Description, widget: text }
                  - { name: forLabel,    label: "\"Designed for\" label", widget: string }
                  - name: features
                    label: Features
                    widget: list
                    field: { name: feature, label: Feature, widget: string }

      - name: services_et
        label: "Services – Estonian"
